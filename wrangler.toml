# wrangler.toml
name = 'cf-workers-et-ws'
main = "src/worker.js"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[vars]

# ws目录
WS_PATH = "ws"

# ws2目录（第二节点，客户端当作独立服务器连接，与 /ws 错开断开时间以规避 100s 限制）
WS2_PATH = "ws2"

# 服务端主动断开时间（毫秒）。Cloudflare Workers 免费 WS 最长 100s，这里 90s 留出重连余量
WS_DISCONNECT_INTERVAL_MS = "90000"
# /ws2 第一次连接提前到 45s 断开，之后每 90s 断开一次，从而与 /ws 错开 45s
WS2_FIRST_DISCONNECT_INTERVAL_MS = "45000"
WS2_DISCONNECT_INTERVAL_MS = "90000"

# 转发，0为关闭，1为开启
EASYTIER_DISABLE_RELAY = "0"

EASYTIER_COMPRESS_RPC = "1"

# Workers地域，参考README.md
LOCATION_HINT = "apac"

# 私有模式：填入与客户端相同的网络名称。留空则允许任何人连接
EASYTIER_NETWORK_NAME = ""

# 延迟优先模式：设为 "1" 开启，开启后中继发出的包会带上特权标志位，加速路由收敛
EASYTIER_LATENCY_FIRST = "1"

# 心跳与超时配置（缩短时间，解决节点不消失的问题）
EASYTIER_HEARTBEAT_INTERVAL = "10000" # 10秒发一次心跳
EASYTIER_CONNECTION_TIMEOUT = "25000" # 25秒无响应则踢出
EASYTIER_SESSION_TTL_MS = "180000"

[durable_objects]
bindings = [
  { name = "RELAY_ROOM", class_name = "RelayRoom" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RelayRoom"]
